<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Piano</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <header class="head">
      <div>
        <h1>Piano</h1>
        <p class="lead">Einfach Tasten tippen oder mit der Maus spielen.</p>
      </div>
      <div class="actions">
        <div class="controls">
          <button id="recordBtn" class="btn primary">Aufnehmen</button>
          <button id="stopBtn" class="btn" disabled>Stop</button>
          <button id="playBtn" class="btn" disabled>Abspielen</button>
          <button id="clearBtn" class="btn ghost" disabled>Leeren</button>
        </div>
        <label class="toggle">
          <input id="soundToggle" type="checkbox" checked />
          <span>Sound an</span>
        </label>
        <a class="back" href="../../index.html">Zum Hub</a>
      </div>
    </header>

    <section class="staff-wrap">
      <div class="staff-head">
        <div class="staff-title">Notenblatt</div>
        <div id="recordMeta" class="meta">Keine Aufnahme</div>
      </div>
      <div class="staff" id="staff" aria-label="Notenblatt">
        <div class="staff-track" id="staffTrack">
          <span class="staff-line l1"></span>
          <span class="staff-line l2"></span>
          <span class="staff-line l3"></span>
          <span class="staff-line l4"></span>
          <span class="staff-line l5"></span>
          <div class="playhead" id="playhead" aria-hidden="true"></div>
        </div>
      </div>
      <div class="staff-hint">Aufnahme starten, dann spielen. Abspielen spielt die Aufnahme.</div>
    </section>

    <section class="board" id="keyboard" aria-label="Piano"></section>
    <div class="hint">Tastatur: A S D F G H J (weiße Tasten) · W E T Y U (schwarze)</div>
  </main>

  <script src="app.js"></script>
</body>
</html>
