<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Muehle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <header class="head">
      <div>
        <h1>Muehle</h1>
        <p class="lead">Setzen, Muehle bilden, schlagen und schieben.</p>
      </div>
      <div class="actions">
        <button id="undo" class="ghost">Undo</button>
        <button id="reset" class="reset">Neu starten</button>
      </div>
    </header>

    <section class="ai-bar">
      <label class="ai-toggle">
        <input id="aiToggle" type="checkbox" />
        <span>KI spielt Schwarz</span>
      </label>
      <button id="aiMove" class="ghost">KI Zug</button>
    </section>

    <section class="hud">
      <div class="hud-card">
        <div class="label">Am Zug</div>
        <div id="turn" class="value">-</div>
      </div>
      <div class="hud-card">
        <div class="label">Phase</div>
        <div id="phase" class="value">-</div>
      </div>
      <div class="hud-card">
        <div class="label">Auf der Hand</div>
        <div id="inHand" class="value">-</div>
      </div>
      <div class="hud-card">
        <div class="label">Auf dem Brett</div>
        <div id="onBoard" class="value">-</div>
      </div>
    </section>

    <div class="board" aria-live="polite">
      <svg class="board-lines" viewBox="0 0 100 100" aria-hidden="true">
        <rect x="5" y="5" width="90" height="90" />
        <rect x="20" y="20" width="60" height="60" />
        <rect x="35" y="35" width="30" height="30" />
        <line x1="50" y1="5" x2="50" y2="35" />
        <line x1="50" y1="65" x2="50" y2="95" />
        <line x1="5" y1="50" x2="35" y2="50" />
        <line x1="65" y1="50" x2="95" y2="50" />
      </svg>
      <div id="points" class="points"></div>
    </div>
    <div id="status" class="status">-</div>
    <a class="back" href="../../index.html">Zurueck zum Hub</a>
  </main>
  <script src="app.js"></script>
</body>
</html>
