<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="../../auth.js"></script>
  <title>Catcart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <header class="head">
      <div>
        <h1>Catcart</h1>
        <p class="lead">Mini-Racer: Runde fahren, Checkpoints treffen.</p>
      </div>
      <div class="actions">
        <button id="reset" class="ghost">Neu starten</button>
        <button id="soundToggle" class="ghost">Sound: Aus</button>
        <button id="fullscreenToggle" class="ghost">Fullscreen</button>
        <a class="back" href="../../index.html">Zum Hub</a>
      </div>
    </header>

    <section class="hud">
      <div class="hud-card">
        <div class="label">Runden</div>
        <div id="laps" class="value">0</div>
      </div>
      <div class="hud-card">
        <div class="label">Zeit</div>
        <div id="time" class="value">0.0 s</div>
      </div>
      <div class="hud-card">
        <div class="label">Best</div>
        <div id="best" class="value">-</div>
      </div>
      <div class="hud-card">
        <div class="label">Speed</div>
        <div id="speed" class="value">0</div>
      </div>
    </section>

    <div class="stage">
      <canvas id="game" width="960" height="540" aria-label="Catcart Spiel"></canvas>
      <div id="countdown" class="countdown">3</div>
      <div class="touch-controls">
        <button class="touch-btn" data-key="ArrowUp">Gas</button>
        <div class="touch-row">
          <button class="touch-btn" data-key="ArrowLeft">Links</button>
          <button class="touch-btn" data-key="ArrowDown">Bremse</button>
          <button class="touch-btn" data-key="ArrowRight">Rechts</button>
        </div>
      </div>
      <div class="hint">
        Steuerung: Pfeile oder WASD. Sammle Checkpoints und fahre durch die Startlinie.
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
