<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spiele-Tiles Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orbit"></div>
  <header class="hero">
    <div class="hero-left">
      <div class="brand">Spiele-Tiles</div>
      <h1>W?hle ein Spiel oder Gadget</h1>
      <p class="lead">Ein kuratiertes Set an Projekten. Kacheln sind der Einstieg - wir erg?nzen Schritt fuer Schritt.</p>
    </div>
    <div class="hero-right">
      <div class="stat-card">
        <div class="stat-label">Kacheln</div>
        <div id="count" class="stat-value">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Status</div>
        <div id="statusSummary" class="stat-value">-</div>
      </div>
    </div>
  </header>

  <section class="controls">
    <div class="filters">
      <button class="chip active" data-filter="all">Alle</button>
      <button class="chip" data-filter="board">Brettspiele</button>
      <button class="chip" data-filter="arcade">Arcade</button>
      <button class="chip" data-filter="gadgets">Gadgets</button>
      <button class="chip" data-filter="experiment">Experimente</button>
      <button class="chip" data-filter="tools">Tools</button>
      <button class="chip" data-filter="puzzle">Puzzle</button>
    </div>
    <div class="search">
      <input id="searchInput" type="search" placeholder="Suche nach Titel, Tag, Beschreibung" />
    </div>
    <label class="toggle">
      <input id="toggleComing" type="checkbox" checked />
      <span>Coming-Soon zeigen</span>
    </label>
  </section>

  <main>
    <div id="grid" class="grid" aria-live="polite"></div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <footer class="footer">
    <span>Ideen: M?hle, Schachvarianten, kleine Reaktions-Gadgets, sp?ter ggf. Cat-Platformer.</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
